<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NHANH HƠN - Trò Chơi Trắc Nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            margin: 0;
            padding: 10px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #81c784;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            transition: all 0.3s ease;
        }
        .btn-green {
            background: #4caf50;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #388e3c;
        }
        .btn-green:hover {
            background: #43a047;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2e7d32;
        }
        .option-btn {
            border: 2px solid #a5d6a7;
            transition: all 0.2s ease;
            cursor: pointer;
            word-wrap: break-word;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f1f8e9;
            border-color: #4caf50;
        }
        .option-btn.correct {
            background-color: #4caf50 !important;
            color: white;
            border-color: #2e7d32;
        }
        .option-btn.wrong {
            background-color: #ef5350 !important;
            color: white;
            border-color: #c62828;
        }
        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4caf50;
            width: 0%;
            transition: width 0.3s ease;
        }
        .floating-icon { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .confetti { position: absolute; width: 8px; height: 8px; animation: confetti-fall 3s linear infinite; z-index: 50; }
        @keyframes confetti-fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="app" class="w-full flex justify-center">
        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="glass-card p-6 text-center">
            <h1 class="text-2xl md:text-4xl font-bold text-green-700 mb-2">🌿 AI NHANH HƠN 🌿</h1>
            <p class="text-xs md:text-sm text-green-600 font-bold mb-4 uppercase tracking-widest text-center">Ôn tập Tin học & Thuật toán</p>
            <div class="text-5xl md:text-6xl mb-6 floating-icon">⚡</div>
            
            <div class="space-y-4">
                <input type="text" id="student-name" placeholder="Nhập tên của bạn..." 
                    class="w-full px-5 py-3 md:py-4 rounded-full border-2 border-green-300 focus:border-green-500 focus:outline-none text-base md:text-lg text-center font-bold">
                <button onclick="startGame()" class="btn-green w-full py-3 md:py-4 rounded-full text-lg md:text-xl font-bold uppercase tracking-wider">
                    Sẵn sàng!
                </button>
            </div>
            <p class="mt-6 text-gray-400 text-xs italic">Điền đầy đủ họ và tên! </p>
        </div>

        <!-- Màn hình chơi game -->
        <div id="game-screen" class="glass-card p-4 md:p-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="bg-green-100 px-3 py-1 rounded-full text-green-700 font-bold text-sm" id="timer-display">⏱️ 00:00</div>
                <div class="bg-orange-100 px-3 py-1 rounded-full text-orange-700 font-bold text-sm" id="score-display">⭐ Điểm: 0</div>
            </div>

            <div class="progress-bar mb-6">
                <div id="progress-fill" class="progress-fill"></div>
            </div>

            <div class="mb-6">
                <h2 class="text-xs text-green-600 font-bold uppercase mb-1" id="question-number">Câu 1/20</h2>
                <div id="question-text" class="text-base md:text-xl font-bold text-gray-800 leading-tight min-h-[4rem]">
                    Đang tải câu hỏi...
                </div>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-3">
                <!-- Đáp án được chèn ở đây -->
            </div>
        </div>

        <!-- Màn hình kết thúc -->
        <div id="end-screen" class="glass-card p-6 md:p-10 text-center hidden relative overflow-hidden">
            <h1 class="text-2xl md:text-3xl font-bold text-green-700 mb-2">🏆 CHÚC MỪNG 🏆</h1>
            <div id="winner-name" class="text-2xl md:text-4xl font-extrabold text-orange-500 mb-4 break-words">Học Sinh</div>
            
            <div class="bg-green-50 rounded-2xl p-6 mb-6 border border-green-200">
                <div class="text-5xl md:text-6xl font-bold text-green-600 mb-1" id="final-score">0 / 10</div>
                <p class="text-green-800 font-bold text-sm" id="correct-count">0/20 câu đúng</p>
                <div class="text-gray-600 text-sm" id="final-time">Thời gian: 00:00</div>
            </div>
            
            <button onclick="location.reload()" class="btn-green px-10 py-3 rounded-full text-base font-bold uppercase">
                Chơi lại lượt mới
            </button>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU GỐC (Trộn đáp án sẽ diễn ra khi render) ---
        const Q_BANK = [
            // Nhóm 1: 1-30 (Input/Output)
            {q: "Bài toán: Tính tổng hai số a và b. Đâu là dữ liệu đầu vào (input)?", a: ["Tổng", "a, b", "Kết quả", "Phép cộng"], c: 1},
            {q: "Bài toán: Tính tổng hai số a và b. Đâu là đầu ra (output) cần tìm?", a: ["a", "b", "Tổng", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính hiệu hai số a và b. Đâu là dữ liệu đầu vào (input)?", a: ["Hiệu", "a, b", "Kết quả", "Phép trừ"], c: 1},
            {q: "Bài toán: Tính hiệu hai số a và b. Đâu là đầu ra (output) cần tìm?", a: ["a", "b", "Hiệu", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính tích hai số a và b. Đâu là dữ liệu đầu vào (input)?", a: ["Tích", "a, b", "Kết quả", "Phép nhân"], c: 1},
            {q: "Bài toán: Tính tích hai số a và b. Đâu là đầu ra (output) cần tìm?", a: ["a", "b", "Tích", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính thương hai số a và b. Đâu là dữ liệu đầu vào (input)?", a: ["Thương", "a, b", "Kết quả", "Phép chia"], c: 1},
            {q: "Bài toán: Tính thương hai số a và b. Đâu là đầu ra (output) cần tìm?", a: ["a", "b", "Thương", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính diện tích hình chữ nhật khi biết chiều dài và chiều rộng. Đâu là dữ liệu đầu vào (input)?", a: ["Diện tích", "Chiều dài", "Chiều dài và chiều rộng", "Chu vi"], c: 2},
            {q: "Bài toán: Tính diện tích hình chữ nhật khi biết chiều dài và chiều rộng. Đâu là đầu ra (output) cần tìm?", a: ["Chiều dài", "Chiều rộng", "Diện tích", "Tổng"], c: 2},
            {q: "Bài toán: Tính chu vi hình chữ nhật khi biết chiều dài và chiều rộng. Đâu là dữ liệu đầu vào (input)?", a: ["Chu vi", "Chiều dài, chiều rộng", "Diện tích", "Kết quả"], c: 1},
            {q: "Bài toán: Tính chu vi hình chữ nhật khi biết chiều dài và chiều rộng. Đâu là đầu ra (output) cần tìm?", a: ["Chiều dài", "Chiều rộng", "Chu vi", "Tổng"], c: 2},
            {q: "Bài toán: Tính diện tích hình vuông khi biết cạnh a. Đâu là dữ liệu đầu vào (input)?", a: ["Diện tích", "a", "Chu vi", "Kết quả"], c: 1},
            {q: "Bài toán: Tính diện tích hình vuông khi biết cạnh a. Đâu là đầu ra (output) cần tìm?", a: ["a", "Chu vi", "Diện tích", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính chu vi hình tròn khi biết bán kính r. Đâu là dữ liệu đầu vào (input)?", a: ["Chu vi", "r", "Diện tích", "Kết quả"], c: 1},
            {q: "Bài toán: Tính chu vi hình tròn khi biết bán kính r. Đâu là đầu ra (output) cần tìm?", a: ["r", "Chu vi", "Diện tích", "Dữ liệu"], c: 1},
            {q: "Bài toán: Tính trung bình cộng của ba số a, b, c. Đâu là dữ liệu đầu vào (input)?", a: ["Trung bình", "a, b, c", "Tổng", "Kết quả"], c: 1},
            {q: "Bài toán: Tính trung bình cộng của ba số a, b, c. Đâu là đầu ra (output) cần tìm?", a: ["a, b, c", "Tổng", "Trung bình", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính tuổi của một người khi biết năm sinh. Đâu là dữ liệu đầu vào (input)?", a: ["Tuổi", "Năm sinh", "Kết quả", "Thời gian"], c: 1},
            {q: "Bài toán: Tính tuổi của một người khi biết năm sinh. Đâu là đầu ra (output) cần tìm?", a: ["Năm sinh", "Tuổi", "Kết quả", "Dữ liệu"], c: 1},
            {q: "Bài toán: Đổi nhiệt độ từ độ C sang độ F. Đâu là dữ liệu đầu vào (input)?", a: ["F", "C", "Nhiệt độ", "Kết quả"], c: 1},
            {q: "Bài toán: Đổi nhiệt độ từ độ C sang độ F. Đâu là đầu ra (output) cần tìm?", a: ["C", "F", "Nhiệt độ", "Dữ liệu"], c: 1},
            {q: "Bài toán: Tính số tiền phải trả khi mua hàng. Đâu là dữ liệu đầu vào (input)?", a: ["Tổng tiền", "Giá và số lượng", "Kết quả", "Hóa đơn"], c: 1},
            {q: "Bài toán: Tính số tiền phải trả khi mua hàng. Đâu là đầu ra (output) cần tìm?", a: ["Giá", "Số lượng", "Tổng tiền", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính điểm trung bình của học sinh khi biết điểm Văn, Toán, Tiếng Anh. Đâu là dữ liệu đầu vào (input)?", a: ["Điểm trung bình", "Các điểm thành phần", "Kết quả", "Tổng"], c: 1},
            {q: "Bài toán: Tính điểm trung bình của học sinh khi biết điểm Văn, Toán, Tiếng Anh. Đâu là đầu ra (output) cần tìm?", a: ["Điểm thành phần", "Tổng", "Điểm trung bình", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính quãng đường khi biết vận tốc và thời gian. Đâu là dữ liệu đầu vào (input)?", a: ["Quãng đường", "Vận tốc, thời gian", "Kết quả", "Tổng"], c: 1},
            {q: "Bài toán: Tính quãng đường khi biết vận tốc và thời gian. Đâu là đầu ra (output) cần tìm?", a: ["Vận tốc", "Thời gian", "Quãng đường", "Dữ liệu"], c: 2},
            {q: "Bài toán: Tính vận tốc khi biết quãng đường và thời gian. Đâu là dữ liệu đầu vào (input)?", a: ["Vận tốc", "Quãng đường, thời gian", "Kết quả", "Tổng"], c: 1},
            {q: "Bài toán: Tính vận tốc khi biết quãng đường và thời gian. Đâu là đầu ra (output) cần tìm?", a: ["Quãng đường", "Thời gian", "Vận tốc", "Dữ liệu"], c: 2},

            // Nhóm 2: 31-55 (Tuần tự)
            {q: "Nhập hai số a và b, tính tổng rồi thông báo kết quả. Thuật toán thuộc cấu trúc nào?", a: ["Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Tuần tự", "Lặp"], c: 2},
            {q: "Nhập một số a, tính bình phương của nó. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập dài và rộng, tính chu vi rồi thông báo. Thuật toán có đặc điểm gì?", a: ["Có điều kiện", "Làm theo thứ tự", "Có 2 nhánh", "Lặp lại"], c: 1},
            {q: "Nhập bán kính r, tính diện tích hình tròn. Đây là dạng cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},
            {q: "Nhập 3 số a, b, c, tính trung bình cộng. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập dài và rộng, tính diện tích rồi thông báo. Đặc điểm thuật toán là gì?", a: ["Có điều kiện", "Không có điều kiện", "Có else", "Có lặp"], c: 1},
            {q: "Nhập số a, tính a³ rồi thông báo kết quả. Đây là cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},
            {q: "Nhập quãng đường và thời gian, tính vận tốc. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập giá tiền và số lượng, tính tổng tiền. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},
            {q: "Nhập nhiệt độ C, đổi sang F. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính trị tuyệt đối của a (không xét điều kiện). Đây là cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a + 10. Thuật toán có đặc điểm gì?", a: ["Có điều kiện", "Không có điều kiện", "Có nhánh", "Có lặp"], c: 1},
            {q: "Nhập hai số a và b, tính hiệu của chúng. Đây là dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a × 2. Thuộc cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},
            {q: "Nhập 3 cạnh tam giác, tính chu vi. Đây là dạng gì?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số phút, đổi sang giờ. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a - 5. Đây là cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},
            {q: "Nhập số a, tính a / 2. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập dài, rộng, cao, tính thể tích hình hộp. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số tiền, tính tiền thuế. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a + a. Đây là dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a × a × a. Thuật toán thuộc cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số ngày, đổi sang số giờ. Đây là dạng gì?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số kg, đổi sang gam. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh", "Lặp", "Sai"], c: 0},
            {q: "Nhập số a, tính a + 1. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 0},

            // Nhóm 3: 56-80 (Thiếu)
            {q: "Nhập a, nếu a > 0 thì thông báo a. Thuật toán thuộc cấu trúc nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập điểm, nếu điểm ≥ 5 thì báo “Đạt”. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập số a, nếu a < 0 báo “Số âm”. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập số a, nếu a chia hết cho 2 báo “Số chẵn”. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập số a, nếu a > 10 báo “Lớn hơn 10”. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập nhiệt độ, nếu > 30 báo “Trời nóng”. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập số a, nếu a = 0 báo “Số 0”. Thuật toán thuộc dạng nào?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},
            {q: "Nhập tuổi, nếu tuổi ≥ 18 báo “Đủ tuổi”. Đây là cấu trúc gì?", a: ["Tuần tự", "Rẽ nhánh thiếu", "Rẽ nhánh đủ", "Lặp"], c: 1},

        // --- HỆ THỐNG ÂM THANH ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function soundCorrect() { playTone(600, 'sine', 0.2); setTimeout(() => playTone(800, 'sine', 0.3), 100); }
        function soundWrong() { playTone(150, 'sawtooth', 0.5, 0.1); }
        function soundClick() { playTone(400, 'triangle', 0.05); }

        // --- LOGIC TRÒ CHƠI ---
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let startTime;
        let timerInterval;
        let playerName = "";

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function getMixedQuestions() {
            const g1 = Q_BANK.slice(0, 30);
            const g2 = Q_BANK.slice(30, 55);
            const g3 = Q_BANK.slice(55, 80);
            const g4 = Q_BANK.slice(80, 100);

            const selected = [
                ...shuffle(g1).slice(0, 5),
                ...shuffle(g2).slice(0, 5),
                ...shuffle(g3).slice(0, 5),
                ...shuffle(g4).slice(0, 5)
            ];
            return shuffle(selected);
        }

        function startGame() {
            const nameInput = document.getElementById('student-name');
            if (!nameInput.value.trim()) { alert("Vui lòng nhập tên của bạn!"); return; }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playerName = nameInput.value.trim();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            currentQuestions = getMixedQuestions();
            currentIndex = 0;
            score = 0;
            startTime = Date.now();
            
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const secs = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `⏱️ ${mins}:${secs}`;
            }, 1000);
        }

        function renderQuestion() {
            const qData = currentQuestions[currentIndex];
            document.getElementById('question-number').innerText = `Câu hỏi ${currentIndex + 1}/20`;
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('progress-fill').style.width = `${(currentIndex / 20) * 100}%`;
            
            // LOGIC TRỘN ĐÁP ÁN:
            // Tạo mảng index [0, 1, 2, 3] và xáo trộn nó
            const originalAnswers = [...qData.a];
            const correctText = originalAnswers[qData.c];
            const shuffledIndices = shuffle([0, 1, 2, 3]);

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            shuffledIndices.forEach((shuffledIdx, displayIdx) => {
                const answerText = originalAnswers[shuffledIdx];
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-3 md:p-4 rounded-xl text-left font-semibold text-sm md:text-base flex items-center bg-white shadow-sm';
                btn.innerHTML = `
                    <span class="min-w-[32px] h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center mr-3 text-xs font-bold">
                        ${String.fromCharCode(65 + displayIdx)}
                    </span> 
                    <span class="flex-1">${answerText}</span>
                `;
                
                // Gắn sự kiện kiểm tra dựa trên nội dung text thay vì index cũ
                btn.onclick = () => checkAnswer(answerText === correctText, btn, correctText);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect, btn, correctText) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score += 0.5;
                soundCorrect();
            } else {
                btn.classList.add('wrong');
                // Tìm và highlight đáp án đúng
                allButtons.forEach(b => {
                    if (b.innerText.includes(correctText)) b.classList.add('correct');
                });
                soundWrong();
            }

            document.getElementById('score-display').innerText = `⭐ Điểm: ${score.toFixed(1)}`;

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < 20) renderQuestion(); else endGame();
            }, 1200);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');

            document.getElementById('winner-name').innerText = playerName;
            document.getElementById('final-score').innerText = `${score.toFixed(1)} / 10`;
            document.getElementById('correct-count').innerText = `${Math.round(score / 0.5)}/20 câu đúng`;
            document.getElementById('final-time').innerText = `Thời gian: ${mins}:${secs}`;
            createConfetti();
        }

        function createConfetti() {
            const container = document.getElementById('end-screen');
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);
            }
        }
    </script>
