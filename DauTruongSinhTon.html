<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE WARRIOR</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f0f1e; color:white; font-family:sans-serif; }
.btn { background:#4facfe; padding:12px; border-radius:10px; width:100%; }
.answer { border:1px solid #444; padding:10px; margin:5px 0; border-radius:8px; }
.correct { background:green; }
.wrong { background:red; }
</style>
</head>

<body class="p-5">

<!-- LOGIN -->
<div id="login">
    <h2>Nhập tên</h2>
    <input id="name" class="p-2 text-black w-full mb-3">
    <button onclick="start()" class="btn">Bắt đầu</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
    <h3 id="question"></h3>
    <div id="answers"></div>
</div>

<!-- END -->
<div id="end" style="display:none;">
    <h2>Kết thúc</h2>
    <p id="result"></p>

    <h3>🏆 Bảng xếp hạng</h3>
    <div id="leaderboard"></div>

    <button onclick="location.reload()" class="btn mt-3">Chơi lại</button>
</div>

<script>
let questions = [
    {q:"Biến là gì?", a:["Giá trị cố định","Vùng nhớ lưu dữ liệu","Phép toán","Lệnh"], c:1},
    {q:"a=5, a=a+3?", a:["5","8","3","10"], c:1},
    {q:"Hằng là gì?", a:["Thay đổi","Không đổi","Biến","Lệnh"], c:1}
];

let i=0, score=0, player="";

function start(){
    player = document.getElementById("name").value;
    if(!player){ alert("Nhập tên!"); return; }

    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="block";
    loadQ();
}

function loadQ(){
    if(i>=questions.length){
        endGame();
        return;
    }
    let q = questions[i];
    document.getElementById("question").innerText = q.q;

    let html="";
    q.a.forEach((ans,idx)=>{
        html += `<div class="answer" onclick="check(${idx}, this)">${ans}</div>`;
    });
    document.getElementById("answers").innerHTML = html;
}

function check(ans, el){
    let q = questions[i];
    if(ans===q.c){
        el.classList.add("correct");
        score+=10;
    }else{
        el.classList.add("wrong");
    }
    setTimeout(()=>{ i++; loadQ(); },800);
}

function endGame(){
    document.getElementById("game").style.display="none";
    document.getElementById("end").style.display="block";
    document.getElementById("result").innerText = player+" - "+score+" điểm";

    if(window.saveScore){
        window.saveScore(player, score);
    }
}
</script>

<!-- 🔥 FIREBASE FIX FULL -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyD271ASAycutvOF4dW2AjBCWeKcQsuTnp8",
    authDomain: "test2-khoi8.firebaseapp.com",
    databaseURL: "https://test2-khoi8-default-rtdb.firebaseio.com/",
    projectId: "test2-khoi8",
    storageBucket: "test2-khoi8.appspot.com",
    messagingSenderId: "795952156966",
    appId: "1:795952156966:web:429927accbe3c9d882f1e7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveScore = async function(name, score){
    try{
        console.log("Saving:", name, score);

        await push(ref(db,"leaderboard"),{
            name:name,
            energy:Number(score),
            time:Date.now()
        });

        console.log("Saved!");
    }catch(e){
        console.error(e);
        alert("Lỗi Firebase! Kiểm tra Rules!");
    }
};

const qRef = query(ref(db,"leaderboard"), orderByChild("energy"), limitToLast(10));

onValue(qRef,(snap)=>{
    let data = snap.val();

    if(!data){
        document.getElementById("leaderboard").innerHTML="Chưa có dữ liệu";
        return;
    }

    let arr = Object.values(data).sort((a,b)=>b.energy-a.energy);

    let html="";
    arr.forEach((s,i)=>{
        html+=`<div>${i+1}. ${s.name} - ${s.energy}⚡</div>`;
    });

    document.getElementById("leaderboard").innerHTML=html;
});
</script>

</body>
</html>
